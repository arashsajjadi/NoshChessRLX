project:
  name: NoshChessRLX_LearningTest
  seed: 42
  output_dir: ./chess_hybrid_rl_runs
  verbosity: info
  device: auto
  dtype: bf16
  compile: false
  compile_mode: reduce-overhead
  allow_tf32: true

hardware:
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  cudnn_benchmark: true
  gradient_accumulation_steps: 1

run:
  stage: full
  continue_from: ""
  clear_cache: false
  safe_save_on_error: true
  profile: false  # پروفایل خاموش شد تا لاگ‌های اضافه سرعت را کم نکنند

teacher:
  enabled: true
  engine_path: /usr/games/stockfish
  threads: 16
  hash_mb: 2048
  movetime_ms: 30
  depth: null
  multipv: 4
  cp_to_value_scale: 600.0
  policy_temperature: 80.0

phase1:
  epochs: 5               # افزایش به 5 برای دیدن روند کاهش Loss
  batch_size: 256         # افزایش بچ‌سایز برای استفاده بهتر از گرافیک
  lr: 0.0003
  weight_decay: 0.0001
  label_smoothing: 0.0
  policy_loss_weight: 1.0
  value_loss_weight: 0.5
  entropy_weight: 0.001
  teacher_samples_per_epoch: 4000  # کاهش سمپل‌ها تا هر اپوک سریع‌تر تمام شود
  teacher_games_per_epoch: 8       # کاهش تعداد بازی در هر اپوک
  max_teacher_game_plies: 100

phase2:
  epochs: 5               # افزایش به 5 برای دیدن روند خودآموزی
  batch_size: 256
  lr: 0.00015
  weight_decay: 0.0001
  value_loss_weight: 1.0
  policy_loss_weight: 1.0
  search_loss_weight: 1.0
  entropy_weight: 0.0005
  replay_buffer_capacity: 50000    # بافر کوچکتر برای تست
  selfplay_games_per_epoch: 8      # بازی‌های کمتر برای سرعت بیشتر
  max_game_plies: 150
  update_epochs_per_cycle: 2
  minibatches_per_epoch: 16

curriculum:
  overlap_start_epoch: 0
  overlap_span_epochs: 5           # کاهش هدایت استاد طی این 5 اپوک
  teacher_ratio_start: 1.0
  teacher_ratio_end: 0.0
  kl_anchor_weight_start: 0.02
  kl_anchor_weight_end: 0.0

reward:
  gamma: 0.997
  cp_delta_scale: 120.0
  w_cp: 0.60
  w_match: 0.25
  w_terminal: 0.15
  w_stall: 0.02
  draw_penalty: true
  draw_base: 0.15
  draw_tau: 80.0
  repetition_penalty: 0.03

gae:
  gamma: 0.997
  lambda_min: 0.80
  lambda_max: 0.97
  lambda_init: 0.92
  ema_beta: 0.90
  k_noise: 0.12
  k_value_var: 0.05

mcts:
  simulations: 32         # کمی بیشتر از 16 برای کیفیت بهتر اما همچنان سریع
  c_puct: 1.75
  dirichlet_alpha: 0.30
  dirichlet_eps: 0.25
  temperature_start: 1.00
  temperature_end: 0.10
  temperature_decay_plies: 20
  root_noise: true

model:
  input_planes: 18
  channels: 128
  num_blocks: 10
  value_head_hidden: 256
  dropout: 0.0
  action_size: 20480

eval:
  every_n_epochs: 5       # در اپوک آخر یک ارزیابی انجام می‌شود
  arena_games: 4          # 4 بازی برای ارزیابی سریع
  opponent_elo: 2900.0
  baseline_movetime_ms: 20
  max_game_plies: 160

logging:
  log_every_steps: 10     # لاگ‌گیری سریع‌تر برای دیدن جزئیات
  checkpoint_every_epochs: 5
  emergency_checkpoint_every_minutes: 15
  tensorboard: true
  jsonl: true
  profile_every_steps: 0